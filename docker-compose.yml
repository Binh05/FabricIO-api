services:
  # 1. Cơ sở dữ liệu Postgres
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: Dotnet
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  # 2. Lưu trữ đối tượng MinIO (giống S3)
  storage:
    image: minio/minio
    restart: always
    ports:
      - "9000:9000" # API port
      - "9001:9001" # Console UI port
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  mc-setup:
    image: quay.io/minio/mc
    depends_on:
      - storage
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://storage:9000 admin password123;
      mc anonymous set download myminio/game-assets;
      mc anonymous set download myminio/file/avatar;
      mc cp --attr "Content-Type=application/javascript;Content-Encoding=br" \
      alias/bucket-name/path/to/KatanaRushDijkstraWeb.framework.js.br \
      alias/bucket-name/path/to/KatanaRushDijkstraWeb.framework.js.br
      exit 0;
      "

  # 3. Web Server Nginx
  web_server:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - db
      - storage

volumes:
  db_data:
  minio_data:
